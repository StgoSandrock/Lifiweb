
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        html { scroll-behavior: smooth; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
        .animate-pulse {
            animation: slideInRight 0.3s ease-out;
        }
        .toast-exit {
            animation: slideOutRight 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-slate-950 font-sans text-slate-900 antialiased overflow-x-hidden">

    <!-- Modal para registrar goles y tarjetas -->

    <!-- Contenedor para notificaciones Toast -->

    <script type="module">

        // ==========================================
        // 1. CONFIGURACIÓN DE FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBLGMtJ6QJSNwakmD_PdgtstARICyu1sEI",
            authDomain: "lifiwebapp.firebaseapp.com",
            projectId: "lifiwebapp",
            storageBucket: "lifiwebapp.firebasestorage.app",
            messagingSenderId: "798436972351",
            appId: "1:798436972351:web:7242cbd43e3fb46c99a58a",
            measurementId: "G-4CJH9M87YL"
        };

        const isFirebaseConfigured = firebaseConfig.apiKey !== "";
        let app, auth, db;
        const appId = 'lifi-2026-prod';

        if (isFirebaseConfigured) {
            app = initializeApp(firebaseConfig);

        } else {

        }
        
// ==========================================
// 2. CONSTANTES GLOBALES Y ESTRUCTURA DE DATOS
// ==========================================
const LIGA_CLUBS = [
    { id: 'manquehue', name: 'Club Manquehue', logo: 'logo_manquehue.png' },
    { id: 'espanol', name: 'Estadio Español', logo: 'estadio español logo.png' },
    { id: 'israelita', name: 'Estadio Israelita', logo: 'logo-club-israelita.png' },
    { id: 'palestino', name: 'Club Palestino', logo: 'logo palestino.jpeg' },
    { id: 'italiano', name: 'Stadio Italiano', logo: 'stadio italiano logo.png' },
    { id: 'croata', name: 'Estadio Croata', logo: 'estadio_croatalogo-AoPv7zjrKEHMW543.avif' },
    { id: 'bianconero', name: 'Bianconero', logo: 'bianconero logo.png' },
    { id: 'ultimate', name: 'Ultimate S.A.', logo: 'ultimate_logo.png' },
    { id: 'chicureo', name: 'U.C. Chicureo', logo: 'uc_chicureo.png' },
    { id: 'lif', name: 'Club LIF', logo: 'lif.png' }
];

        const CATEGORIES = [
            { id: 'pre-peque', name: 'Pre-Peque', years: '2019-20' },
            { id: 'peque', name: 'Peque', years: '2017-18' },
            { id: 'mini', name: 'Mini', years: '2015-16' },
            { id: 'infantil', name: 'Infantil', years: '2013-14' },
            { id: 'intermedia', name: 'Intermedia', years: '2011-12' }
        ];

        const CUP_CATEGORIES = ['pre-peque', 'peque', 'mini'];

        const CUP_CLUBS_BY_CATEGORY = {
            'pre-peque': [
                'Club Manquehue',
                'D Rojos',
                'Barnechea',
                'Estadio Israelita',
                'Country Club',
                'Alumni',
                'Club Sirio',
                'Club Palestino'
            ],
            'peque': [
                'Universidad San Sebastián',
                'Club Manquehue',
                'D Rojos',
                'Barnechea',
                'Estadio Israelita',
                'Country Club',
                'Alumni',
                'Club Sirio',
                'Club Palestino',
                'Stadio Italiano',
                'F Albo',
                'Estadio Español'
            ],
            'mini': [
                'Universidad San Sebastián',
                'Club Manquehue',
                'Ultimate',
                'Barnechea',
                'P Gales',
                'Country Club',
                'Alumni',
                'Club Sirio',
                'Club Palestino',
                'F Albo'
            ]
        };

        const INITIAL_MOCK_PLAYERS = [];
        const INITIAL_MOCK_FIXTURES = [];

// ==========================================
        // 3. ESTADO GLOBAL (LOCAL STATE)
        // ==========================================
        let state = {
            view: 'lobby',          
            activeMode: 'liga',      
            tournament: 'apertura', 
            subView: 'tabla',       
            selectedClub: null,     
            category: 'infantil',   
            players: [],
            fixtures: [],
            currentUser: null,
            isAdmin: false,
            lastSelectedClub: 'Club Manquehue',
            editingFixtureId: null,
            editingFixture: null,
            fixtureGoals: null,
            teamDashboardMode: false,
            selectedTeamDashboard: null,
            unsavedChanges: false
        };

        window.setState = function(updatedState) {
            state = { ...state, ...updatedState };
            render();
        };

        window.selectClubView = function(clubName) {
            window.setState({ selectedClub: clubName });
            window.scrollTo(0, 0);
        };

        // ==========================================
        // 4. LÓGICA DE FIREBASE Y PANELES
        // ==========================================
        const initAuthAndSync = async () => {
            if (!isFirebaseConfigured) return;

            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Error al autenticar en Firebase:", error);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    state.currentUser = user;
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'jugadores'), (snapshot) => {
                        let fetchedPlayers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        window.setState({ players: fetchedPlayers });
                    });

                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'partidos'), (snapshot) => {
                        let fetchedFixtures = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        window.setState({ fixtures: fetchedFixtures });
                    });
                }
            });
        };

        // ==========================================
        // 5. CÁLCULOS EN TIEMPO REAL
        // ==========================================
        
        // ---> NUEVA FUNCIÓN PARA ORDENAR POR APELLIDO <---
        function getApellido(nombreCompleto) {
            if (!nombreCompleto) return '';
            const partes = nombreCompleto.trim().split(' ');
            return partes.length > 1 ? partes[partes.length - 1].toLowerCase() : nombreCompleto.toLowerCase();
        }

        function getRealTopScorers(isCup) {
            const targetCats = isCup ? CATEGORIES.filter(c => CUP_CATEGORIES.includes(c.id)) : CATEGORIES;
            return targetCats.map(cat => {
                const catPlayers = state.players.filter(p => p.categoria === cat.id && p.cupPlayer === isCup);
                if (catPlayers.length === 0) return { category: cat.name, nombre: 'Pendiente', club: '---', goles: 0 };
                const sorted = [...catPlayers].sort((a, b) => b.goles - a.goles);
                const maxGoles = sorted[0]?.goles || 0;
                
                const leaders = sorted.filter(p => p.goles === maxGoles && maxGoles > 0);
                if (leaders.length === 0) {
                    return { category: cat.name, nombre: 'Pendiente', club: '---', goles: 0 };
                } else if (leaders.length === 1) {
                    return { category: cat.name, nombre: leaders[0].nombre, club: leaders[0].club, goles: leaders[0].goles };
                } else {
                    return { category: cat.name, nombre: leaders.map(l => l.nombre).join(' / '), club: 'Empate', goles: maxGoles };
                }
            });
        }

        function getStandings() {
            const isCup = state.activeMode === 'cup';
            const clubs = isCup 
                ? (CUP_CLUBS_BY_CATEGORY[state.category] || []).map(name => {
                    const mapped = LIGA_CLUBS.find(c => c.name === name);
                    return mapped ? mapped : { id: name.toLowerCase().replace(/\s+/g, ''), name, logo: '' };
                })
                : LIGA_CLUBS;

            const stats = {};
            clubs.forEach(club => { stats[club.name] = { id: club.id, name: club.name, logo: club.logo, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dg: 0, pts: 0 }; });

            const filteredFixtures = state.fixtures.filter(f => f.tournament === state.tournament && f.isCup === isCup && f.category === state.category && f.status === 'played');

            filteredFixtures.forEach(m => {
                if (!stats[m.local] || !stats[m.visita]) return;
                stats[m.local].pj++; stats[m.visita].pj++;
                stats[m.local].gf += m.golesL; stats[m.local].gc += m.golesV;
                stats[m.visita].gf += m.golesV; stats[m.visita].gc += m.golesL;

                if (m.golesL > m.golesV) { stats[m.local].pg++; stats[m.local].pts += 3; stats[m.visita].pp++; } 
                else if (m.golesL < m.golesV) { stats[m.visita].pg++; stats[m.visita].pts += 3; stats[m.local].pp++; } 
                else { stats[m.local].pe++; stats[m.local].pts += 1; stats[m.visita].pe++; stats[m.visita].pts += 1; }
                
                stats[m.local].dg = stats[m.local].gf - stats[m.local].gc;
                stats[m.visita].dg = stats[m.visita].gf - stats[m.visita].gc;
            });

            return Object.values(stats).sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                return b.dg - a.dg;
            });
        }

        // ==========================================
        // NUEVA FUNCIÓN: GENERAR CRUCES AUTOMÁTICOS (ROUND ROBIN)
        // ==========================================
        function generateAllFixtures() {
            const isCup = state.activeMode === 'cup';
            const clubs = isCup 
                ? CUP_CLUBS_BY_CATEGORY[state.category] || []
                : LIGA_CLUBS.map(c => c.name);

            const tournaments = ['apertura', 'clausura'];
            const newFixtures = [];

            tournaments.forEach(tournament => {
                // Generar round-robin para todos los equipos
                for (let i = 0; i < clubs.length; i++) {
                    for (let j = i + 1; j < clubs.length; j++) {
                        // Partido 1: clubs[i] local, clubs[j] visita
                        const id1 = 'f_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                        newFixtures.push({
                            id: id1,
                            tournament: tournament,
                            isCup: isCup,
                            category: state.category,
                            fecha: 'Pendiente',
                            local: clubs[i],
                            visita: clubs[j],
                            golesL: 0,
                            golesV: 0,
                            status: 'pending',
                            fechaCompleta: '',
                            cancha: 'Por definir',
                            hora: '12:00',
                            fechaNumero: 0
                        });

                        // Partido 2: clubs[j] local, clubs[i] visita
                        const id2 = 'f_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                        newFixtures.push({
                            id: id2,
                            tournament: tournament,
                            isCup: isCup,
                            category: state.category,
                            fecha: 'Pendiente',
                            local: clubs[j],
                            visita: clubs[i],
                            golesL: 0,
                            golesV: 0,
                            status: 'pending',
                            fechaCompleta: '',
                            cancha: 'Por definir',
                            hora: '12:00',
                            fechaNumero: 0
                        });
                    }
                }
            });

            return newFixtures;
        }

        window.generateAllFixtures = async function() {
            const newFixtures = generateAllFixtures();
            
            for (let fixture of newFixtures) {
                if (isFirebaseConfigured && state.currentUser) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'partidos', fixture.id), fixture);
                } else {
                    state.fixtures.push(fixture);
                }
            }
            
            if (!isFirebaseConfigured) {
                window.setState({});
            }
            
            alert(`Se generaron ${newFixtures.length} cruces automáticamente para ${state.activeMode === 'cup' ? 'LIFI Cup' : 'LIGA LIFI'} - ${CATEGORIES.find(c => c.id === state.category)?.name}`);
        };

        initAuthAndSync();

        // ---------------- Funciones del Staff ----------------
        window.verifyAdminLogin = function(event) {
            event.preventDefault();
            const pass = event.target.password.value;
            if (pass === "133233") {
                window.setState({ view: 'admin', isAdmin: true });
                toggleLoginModal(false);
            } else {
                const errMessage = document.getElementById('login-error-msg');
                if (errMessage) {
                    errMessage.innerText = 'Contraseña incorrecta. Inténtelo de nuevo.';
                    errMessage.classList.remove('hidden');
                }
            }
        };

        window.toggleLoginModal = function(show) {
            const modal = document.getElementById('login-modal');
            if (modal) {
                if (show) {
                    modal.classList.remove('hidden');
                } else {
                    modal.classList.add('hidden');
                    const errMessage = document.getElementById('login-error-msg');
                    if (errMessage) errMessage.classList.add('hidden');
                }
            }
        };

window.savePlayer = async function(event) {
            event.preventDefault();
            const form = event.target;
            const id = 'p_' + Date.now();
            const isCup = state.activeMode === 'cup';

            // Guardamos el club seleccionado en el estado antes de limpiar el formulario
            state.lastSelectedClub = form.club.value;

            const player = {
                id,
                nombre: form.nombre.value.trim(),
                posicion: form.posicion.value || '', 
                club: form.club.value,
                categoria: state.category,
                goles: parseInt(form.goles.value) || 0,
                pj: parseInt(form.pj.value) || 0,
                ta: parseInt(form.ta.value) || 0,
                tr: parseInt(form.tr.value) || 0,
                cupPlayer: isCup
            };

            if (isFirebaseConfigured && state.currentUser) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'jugadores', id), player);
            } else {
                state.players.push(player);
                window.setState({});
            }
            markUnsavedChanges();
            showToast('✓ Jugador agregado exitosamente', 'success');
            form.reset();
        };

        window.updatePlayerStatInDb = async function(playerId, field, value) {
            let finalValue = value;
            if (field !== 'nombre' && field !== 'posicion') {
                finalValue = isNaN(value) ? value : parseInt(value);
            }
            
            if (isFirebaseConfigured && state.currentUser) {
                const playerRef = doc(db, 'artifacts', appId, 'public', 'data', 'jugadores', playerId);
                try {
                    const docSnap = await getDoc(playerRef);
                    if (docSnap.exists()) {
                        await updateDoc(playerRef, { [field]: finalValue });
                    }
                } catch (e) { console.error("Error:", e); }
            } else {
                const p = state.players.find(x => x.id === playerId);
                if (p) p[field] = finalValue;
                window.setState({});
            }
            markUnsavedChanges();
            showToast('✓ Estadísticas actualizadas', 'success');
        };

        window.deletePlayerFromDb = async function(playerId) {
            const confirmation = document.getElementById(`confirm-del-${playerId}`);
            if (confirmation) confirmation.classList.remove('hidden');
        };

        window.confirmDeletePlayer = async function(playerId) {
            if (isFirebaseConfigured && state.currentUser) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'jugadores', playerId));
            } else {
                state.players = state.players.filter(x => x.id !== playerId);
                window.setState({});
            }
            markUnsavedChanges();
            showToast('✓ Jugador eliminado', 'success');
            window.cancelDeletePlayer(playerId);
        };

        window.cancelDeletePlayer = function(playerId) {
            const confirmation = document.getElementById(`confirm-del-${playerId}`);
            if (confirmation) confirmation.classList.add('hidden');
        };

        window.saveFixture = async function(event) {
            event.preventDefault();
            const form = event.target;
            const id = 'f_' + Date.now();

            const isCupVal = form.isCup.value === 'true';
            const tournamentVal = form.tournament.value;
            const fechaInput = form.fecha.value;
            
            // Extraer número de fecha si es "Fecha X"
            let fechaNumero = 0;
            const match = fechaInput.match(/\d+/);
            if (match) {
                fechaNumero = parseInt(match[0]);
            }

            const fixture = {
                id,
                tournament: tournamentVal,
                isCup: isCupVal,
                category: state.category,
                fecha: fechaInput,
                fechaNumero: fechaNumero,
                local: form.local.value,
                visita: form.visita.value,
                golesL: parseInt(form.golesL.value) || 0,
                golesV: parseInt(form.golesV.value) || 0,
                status: form.status.value,
                fechaCompleta: form.fechaCompleta.value || '2026-05-24',
                cancha: form.cancha.value || 'Por definir',
                hora: form.hora.value || '12:00'
            };

            if (isFirebaseConfigured && state.currentUser) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'partidos', id), fixture);
            } else {
                state.fixtures.push(fixture);
                window.setState({});
            }
            markUnsavedChanges();
            showToast('✓ Partido agregado exitosamente', 'success');
            form.reset();
        };

        window.updateFixtureStatInDb = async function(fixtureId, field, value) {
            let parsedValue = isNaN(value) ? value : parseInt(value);
            
            // Si es el campo 'fecha', extraer también el fechaNumero
            const updateObj = { [field]: parsedValue };
            if (field === 'fecha') {
                const match = value.match(/\d+/);
                updateObj.fechaNumero = match ? parseInt(match[0]) : 0;
            }
            
            if (isFirebaseConfigured && state.currentUser) {
                const fixtureRef = doc(db, 'artifacts', appId, 'public', 'data', 'partidos', fixtureId);
                await updateDoc(fixtureRef, updateObj);
            } else {
                const f = state.fixtures.find(x => x.id === fixtureId);
                if (f) {
                    f[field] = parsedValue;
                    if (field === 'fecha') {
                        const match = value.match(/\d+/);
                        f.fechaNumero = match ? parseInt(match[0]) : 0;
                    }
                }
                window.setState({});
            }
            markUnsavedChanges();
            showToast('✓ Datos del partido actualizados', 'success');
        };

        window.deleteFixtureFromDb = async function(fixtureId) {
            if (isFirebaseConfigured && state.currentUser) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'partidos', fixtureId));
            } else {
                state.fixtures = state.fixtures.filter(x => x.id !== fixtureId);
                window.setState({});
            }
            markUnsavedChanges();
            showToast('✓ Partido eliminado', 'success');
        };

        // ==========================================
        // NUEVO: REGISTRO DE GOLES Y TARJETAS
        // ==========================================
        window.openGoalModal = function(fixtureId) {
            const fixture = state.fixtures.find(f => f.id === fixtureId);
            if (!fixture) return;
            
            state.editingFixtureId = fixtureId;
            state.editingFixture = JSON.parse(JSON.stringify(fixture));
            state.fixtureGoals = JSON.parse(fixture.goalDetails || '{"local": [], "visita": []}');
            
            const modal = document.getElementById('goal-modal');
            const modalContent = document.getElementById('goal-modal-content');
            
            const localTeamPlayers = state.players.filter(p => p.club === fixture.local && p.categoria === fixture.category && p.cupPlayer === fixture.isCup);
            const visitTeamPlayers = state.players.filter(p => p.club === fixture.visita && p.categoria === fixture.category && p.cupPlayer === fixture.isCup);
            
            modalContent.innerHTML = `
                <h2 class="text-2xl font-black text-white uppercase mb-8 tracking-tighter">${fixture.local} vs ${fixture.visita}</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- LOCAL -->
                    <div class="bg-slate-900 rounded-2xl p-6 border border-slate-700">
                        <h3 class="text-xl font-black text-white mb-4 uppercase">${fixture.local}</h3>
                        
                        <div class="mb-6">
                            <label class="text-white text-sm font-bold mb-2 block">Selecciona Jugador:</label>
                            <select id="player-select-local" class="w-full p-3 bg-slate-800 border border-slate-600 rounded-lg text-white font-bold outline-none focus:ring-2 focus:ring-yellow-500">
                                <option value="">-- Seleccionar --</option>
                                ${localTeamPlayers.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('')}
                            </select>
                        </div>

                        <div class="mb-6">
                            <label class="text-white text-sm font-bold mb-2 block">Tipo de Evento:</label>
                            <select id="goal-type-local" class="w-full p-3 bg-slate-800 border border-slate-600 rounded-lg text-white font-bold outline-none focus:ring-2 focus:ring-yellow-500">

                if (isFirebaseConfigured && state.currentUser) {
                    // Los cambios ya se guardan automáticamente, pero aquí puedes hacer un guardado explícito
                    showToast('✓ Cambios guardados exitosamente', 'success');
                } else {

        window.showToast = function(message, type = 'success') {
            const toastContainer = document.getElementById('toast-container');
            if (!toastContainer) {
                // Crear contenedor si no existe
                const container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed bottom-6 right-6 z-50 space-y-3';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            const colors = {
                'success': 'bg-emerald-500',
                'error': 'bg-red-500',
                'info': 'bg-blue-500',
                'warning': 'bg-yellow-500'
            };
            
            toast.className = `${colors[type] || 'bg-slate-500'} text-white font-bold px-6 py-4 rounded-lg shadow-xl animate-pulse`;
            toast.textContent = message;
            
            const container = document.getElementById('toast-container');
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.toggleTeamDashboard = function() {

        window.selectTeamDashboard = function(teamId) {

        window.addGoalToFixture = function(team) {
            const fixture = state.editingFixture;
            const playerSelect = document.getElementById(`player-select-${team}`);
            const typeSelect = document.getElementById(`goal-type-${team}`);
            
            if (!playerSelect.value) {
                alert('Por favor selecciona un jugador');
                return;
            }

            const player = state.players.find(p => p.id === playerSelect.value);
            const type = typeSelect.value; // 'gol', 'ta', 'tr'

            if (!state.fixtureGoals[team]) {
                state.fixtureGoals[team] = [];
            }

            state.fixtureGoals[team].push({
                playerId: player.id,
                playerName: player.nombre,
                type: type
            });

            playerSelect.value = '';
            typeSelect.value = 'gol';
            window.setState({});
        };

        window.removeGoalFromFixture = function(team, index) {
            state.fixtureGoals[team].splice(index, 1);
            window.setState({});
        };

        window.saveFixtureGoals = async function() {
            const fixture = state.editingFixture;
            const goalsLocal = state.fixtureGoals.local || [];
            const goalsVisita = state.fixtureGoals.visita || [];

            // Actualizar los goles en el fixture
            const golesL = goalsLocal.filter(g => g.type === 'gol').length;
            const golesV = goalsVisita.filter(g => g.type === 'gol').length;

            const updatedFixture = {
                ...fixture,
                golesL: golesL,
                golesV: golesV,
                goalDetails: JSON.stringify(state.fixtureGoals),
                status: 'played'
            };

            // Actualizar todos los jugadores afectados
            for (let goal of goalsLocal) {
                const player = state.players.find(p => p.id === goal.playerId);
                if (player) {
                    const updateObj = {};
                    if (goal.type === 'gol') updateObj.goles = (player.goles || 0) + 1;
                    if (goal.type === 'ta') updateObj.ta = (player.ta || 0) + 1;
                    if (goal.type === 'tr') updateObj.tr = (player.tr || 0) + 1;

                    if (isFirebaseConfigured && state.currentUser) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'jugadores', goal.playerId), updateObj);
                    } else {
                        Object.assign(player, updateObj);
                    }
                }
            }

            for (let goal of goalsVisita) {
                const player = state.players.find(p => p.id === goal.playerId);
                if (player) {
                    const updateObj = {};
                    if (goal.type === 'gol') updateObj.goles = (player.goles || 0) + 1;
                    if (goal.type === 'ta') updateObj.ta = (player.ta || 0) + 1;
                    if (goal.type === 'tr') updateObj.tr = (player.tr || 0) + 1;

                    if (isFirebaseConfigured && state.currentUser) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'jugadores', goal.playerId), updateObj);
                    } else {
                        Object.assign(player, updateObj);
                    }
                }
            }

            // Actualizar el fixture
            if (isFirebaseConfigured && state.currentUser) {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'partidos', fixture.id), updatedFixture);
            } else {
                const f = state.fixtures.find(x => x.id === fixture.id);
                if (f) Object.assign(f, updatedFixture);
            }

            markUnsavedChanges();
            window.closeGoalModal();
            showToast('✓ Partido actualizado exitosamente con goles y tarjetas', 'success');
        };

                                        <input name="cancha" placeholder="Cancha" class="p-4 bg-slate-900 border border-slate-700 rounded-xl text-xs font-bold text-white outline-none" />
                                        <select name="status" class="p-4 bg-slate-900 border border-slate-700 rounded-xl text-xs font-bold text-white outline-none">
                                            <option value="pending">Pendiente</option>
                                            <option value="played">Jugado</option>
                                        </select>
                                    </div>
                                    <input name="fechaCompleta" type="date" class="w-full p-4 bg-slate-900 border border-slate-700 rounded-xl text-xs font-bold text-white outline-none" />
                                    <button type="submit" class="w-full bg-yellow-500 text-black font-black py-5 rounded-xl uppercase text-xs tracking-widest hover:bg-yellow-400 transition-colors shadow-lg">Cargar Encuentro</button>
                                </form>
                            </div>

                            <div class="bg-slate-800 rounded-[2.5rem] border border-slate-700/50 p-6 md:p-8 shadow-2xl">
                                <h3 class="font-black text-white uppercase text-xs tracking-widest italic mb-6">Fixture Editable (Ordenado por Fecha)</h3>
                                <div class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                                ${fixturesInCategory
                                    .sort((a, b) => {
                                        if (a.fechaNumero !== b.fechaNumero) {
                                            return a.fechaNumero - b.fechaNumero;
                                        }
                                        return 0;
                                    })
                                    .map(f => `
                                    <div class="p-4 bg-slate-900 rounded-2xl flex flex-col gap-3 border border-slate-700/30 group">
                                        <div class="flex justify-between items-start">
                                            <div class="flex flex-col flex-1">
                                                <input type="text" onblur="updateFixtureStatInDb('${f.id}', 'fecha', this.value)" class="bg-transparent text-[8px] font-black text-slate-500 uppercase outline-none focus:text-yellow-500 w-full" value="${f.fecha}" />
                                                <span class="text-[10px] font-bold text-white uppercase mt-2">${f.local} <span class="text-slate-400">vs</span> ${f.visita}</span>
                                            </div>
                                            <div class="flex gap-2 items-center">
                                                <select onchange="updateFixtureStatInDb('${f.id}', 'status', this.value)" class="bg-transparent text-xs font-bold outline-none px-2 py-1 rounded ${f.status === 'played' ? 'text-emerald-400' : 'text-yellow-500'}">
                                                    <option value="pending" ${f.status==='pending'?'selected':''}>Pendiente</option>
                                                    <option value="played" ${f.status==='played'?'selected':''}>Jugado</option>
                                                </select>
                                                <button onclick="deleteFixtureFromDb('${f.id}')" class="text-slate-500 hover:text-red-500 transition-opacity">🗑️</button>
                                            </div>
                                        </div>
                                        <div class="flex gap-2 items-center">
                                            <input type="number" onblur="updateFixtureStatInDb('${f.id}', 'golesL', this.value)" class="w-10 bg-slate-800 border border-slate-600 rounded p-1 text-center font-black text-white text-xs" value="${f.golesL}" title="Goles Local" />
                                            <span class="text-xs font-bold text-slate-500">-</span>
                                            <input type="number" onblur="updateFixtureStatInDb('${f.id}', 'golesV', this.value)" class="w-10 bg-slate-800 border border-slate-600 rounded p-1 text-center font-black text-white text-xs" value="${f.golesV}" title="Goles Visita" />
                                            <input type="text" onblur="updateFixtureStatInDb('${f.id}', 'hora', this.value)" class="flex-1 bg-slate-800 border border-slate-600 rounded p-1 text-center font-bold text-white text-xs" value="${f.hora}" title="Hora" placeholder="HH:MM" />
                                            <input type="text" onblur="updateFixtureStatInDb('${f.id}', 'cancha', this.value)" class="flex-1 bg-slate-800 border border-slate-600 rounded p-1 text-center font-bold text-white text-xs" value="${f.cancha}" title="Cancha" placeholder="Cancha" />
                                            <button onclick="openGoalModal('${f.id}')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-3 py-1 rounded text-xs uppercase transition-colors">⚽ Goles</button>
                                        </div>
                                    </div>
                                `).join('')}
                                ${fixturesInCategory.length === 0 ? `<p class="text-center py-10 text-[10px] font-bold text-slate-500 uppercase italic">Sin partidos programados</p>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>`;
        }

        function renderLiga() {
            const isCup = state.activeMode === 'cup';
            const categoriesToDisplay = isCup ? CATEGORIES.filter(c => CUP_CATEGORIES.includes(c.id)) : CATEGORIES;
            const standings = getStandings();
            const activeFixture = state.fixtures.filter(f => f.tournament === state.tournament && f.isCup === isCup && f.category === state.category);

            if (state.selectedClub) {
                const clubPlayers = state.players.filter(p => p.club === state.selectedClub && p.categoria === state.category && p.cupPlayer === isCup);
                
                return `
                <div class="min-h-screen bg-slate-50 font-sans antialiased text-slate-950 flex flex-col">
                    ${NavbarHeader()}
                    
                    <div class="bg-blue-950 py-16 px-4 md:px-8 text-white relative overflow-hidden">
                        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1551952237-954a0e68786c?q=80&w=2000')] bg-cover bg-center opacity-10"></div>
                        <div class="container mx-auto relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                            <div class="flex flex-col md:flex-row items-center gap-8 text-center md:text-left w-full md:w-auto">
                                <button onclick="setState({ selectedClub: null })" class="group flex items-center gap-3 px-6 py-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 hover:border-white/20 transition-all">
                                    <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                                    <span class="text-[10px] font-black uppercase tracking-widest">Volver a Posiciones</span>
                                </button>
                                
                                <div class="w-28 h-28 bg-white rounded-[2rem] p-5 shadow-2xl flex items-center justify-center shrink-0 overflow-hidden">
                                    <img src="${LIGA_CLUBS.find(c => c.name === state.selectedClub)?.logo || ''}" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                    <span class="text-blue-950 font-black italic text-2xl uppercase hidden">${state.selectedClub.substring(0,3)}</span>
                                </div>
                                <div>
                                    <h2 class="text-5xl md:text-6xl font-black italic uppercase tracking-tighter leading-none">${state.selectedClub}</h2>
                                    <p class="text-blue-100 text-sm mt-4 opacity-90">Plantilla Detallada</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <main class="container mx-auto px-4 py-12 flex-grow animate-fade-in">
                        <div class="bg-white rounded-[4rem] shadow-2xl border border-slate-200/60 overflow-hidden">
                            <div class="hidden md:overflow-x-auto">
                                <table class="w-full text-left min-w-[700px]">
                                    <thead class="bg-slate-50 border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">
                                        <tr>
                                            <th class="p-8">Jugador</th>
                                            <th class="p-8 text-center">Pos</th>
                                            <th class="p-8 text-center">G</th>
                                            <th class="p-8 text-center">PJ</th>
                                            <th class="p-8 text-center">TA</th>
                                            <th class="p-8 text-center">TR</th>
                                            <th class="p-8 text-right">Tarjetas</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100 text-sm">
                                        ${clubPlayers.map(p => `
                                            <tr class="hover:bg-slate-50 transition-colors group cursor-pointer">
                                                <td class="p-8">
                                                    <div class="font-black text-blue-950 uppercase italic">${p.nombre}</div>
                                                    <div class="text-[9px] font-bold text-slate-500 uppercase mt-1 tracking-widest">${p.posicion || 'Pendiente'}</div>
                                                </td>
                                                <td class="p-8 text-center font-black text-slate-400 text-lg">${p.posicion || '-'}</td>
                                                <td class="p-8 text-center"><span class="bg-blue-50 text-blue-950 font-black px-4 py-2 rounded-lg">${p.goles || 0}</span></td>
                                                <td class="p-8 text-center font-bold text-slate-500">${p.pj || 0}</td>
                                                <td class="p-8 text-center text-xl">${p.ta || 0}</td>
                                                <td class="p-8 text-center text-xl">${p.tr || 0}</td>
                                                <td class="p-8 text-right">
                                                    <div class="flex gap-1.5 justify-end">
                                                        ${Array(p.ta || 0).fill(0).map(() => `<div class="w-4 h-6 bg-yellow-400 rounded-sm shadow-md"></div>`).join('')}
                                                        ${Array(p.tr || 0).fill(0).map(() => `<div class="w-4 h-6 bg-red-500 rounded-sm shadow-md"></div>`).join('')}
                                                        ${(p.ta || 0) === 0 && (p.tr || 0) === 0 ? `<span class="text-slate-200">-</span>` : ''}
                                                    </div>
                                                </td>
                                            </tr>
                                        `).join('')}
                                        ${clubPlayers.length === 0 ? `<tr><td colspan="7" class="p-20 text-center text-slate-400 font-bold uppercase tracking-widest italic">No hay jugadores registrados en esta categoría</td></tr>` : ''}
                                    </tbody>
                                </table>
                            </div>

                            <div class="md:hidden p-6 space-y-4">
                                ${clubPlayers.map(p => `
                                    <div class="bg-slate-50 p-6 rounded-3xl border border-slate-200/50 space-y-4 shadow-sm">
                                        <div class="flex justify-between items-start border-b pb-4">
                                            <div>
                                                <h4 class="font-black text-blue-950 uppercase italic text-lg leading-none">${p.nombre}</h4>
                                                <p class="text-[9px] font-black text-slate-400 uppercase mt-2 tracking-widest">${p.posicion || '<span class="italic text-slate-300 normal-case">Pendiente</span>'}</p>
                                            </div>
                                            <div class="flex gap-1.5">
                                                ${Array(p.ta || 0).fill(0).map(() => `<div class="w-3 h-5 bg-yellow-400 rounded-sm"></div>`).join('')}
                                                ${Array(p.tr || 0).fill(0).map(() => `<div class="w-3 h-5 bg-red-500 rounded-sm"></div>`).join('')}
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-3 gap-3 text-center">
                                            <div class="bg-white p-3 rounded-2xl border"><span class="block text-[8px] font-black text-slate-400 uppercase">PJ</span><span class="font-black text-xl italic text-slate-700">${p.pj || 0}</span></div>
                                            <div class="bg-blue-50 p-3 rounded-2xl border border-blue-100"><span class="block text-[8px] font-black text-blue-400 uppercase">Goles</span><span class="font-black text-xl italic text-blue-700">${p.goles || 0}</span></div>
                                            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100"><span class="block text-[8px] font-black text-slate-400 uppercase">Tarjetas</span><span class="font-black text-xl italic text-slate-700">${(p.ta || 0) + (p.tr || 0)}</span></div>
                                        </div>
                                    </div>
                                `).join('')}
                                ${clubPlayers.length === 0 ? `<p class="p-12 text-center text-slate-400 font-bold uppercase italic text-xs">No hay jugadores registrados</p>` : ''}
                            </div>
                        </div>
                    </main>
                    ${renderFooter()}
                </div>`;
            }

            return `
            <div class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased flex flex-col">
                ${NavbarHeader()}
                
                <div class="bg-blue-950 text-white overflow-x-auto hide-scrollbar scroll-smooth">
                    <div class="container mx-auto px-4 md:px-8 flex justify-between items-center">
                        <div class="flex space-x-8 shrink-0">
                            ${categoriesToDisplay.map(cat => `
                                <button onclick="setState({ category: '${cat.id}', selectedClub: null })" class="py-6 text-[10px] font-black uppercase tracking-[0.2em] border-b-2 transition-all ${state.category === cat.id ? 'border-yellow-500 text-yellow-500' : 'border-transparent text-white/40 hover:text-white'}">
                                    ${cat.name}
                                </button>
                            `).join('')}
                        </div>
                        <div class="flex bg-white/15 p-1 rounded-xl shrink-0 my-3 ml-4">
                            <button onclick="setState({ tournament: 'apertura', selectedClub: null })" class="px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${state.tournament === 'apertura' ? 'bg-white text-blue-950 shadow-sm' : 'text-white/40'}">Apertura</button>
                            <button onclick="setState({ tournament: 'clausura', selectedClub: null })" class="px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${state.tournament === 'clausura' ? 'bg-white text-blue-950 shadow-sm' : 'text-white/40'}">Clausura</button>
                        </div>
                    </div>
                </div>

                <main class="container mx-auto px-4 py-12 flex-grow animate-fade-in">
                    <div class="space-y-12">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div>
                                <h2 class="text-5xl md:text-6xl font-black text-blue-950 uppercase italic tracking-tighter leading-none">
                                    ${isCup ? 'LIFI CUP' : 'LIGA LIFI'}
                                </h2>
                                <p class="text-slate-400 font-bold uppercase text-[10px] tracking-[0.4em] mt-3">
                                    Competición Juvenil 2026 • Torneo ${state.tournament.toUpperCase()} • Serie ${CATEGORIES.find(c => c.id === state.category)?.name}
                                </p>
                            </div>
                            <div class="flex bg-white p-1.5 rounded-2xl shadow-xl border border-slate-200">
                                <button onclick="setState({ subView: 'tabla' })" class="px-8 py-3.5 rounded-xl text-[10px] font-black uppercase transition-all ${state.subView === 'tabla' ? 'bg-blue-950 text-white shadow-lg' : 'text-slate-400 hover:text-blue-950'}">Clasificación</button>
                                <button onclick="setState({ subView: 'fixture' })" class="px-8 py-3.5 rounded-xl text-[10px] font-black uppercase transition-all ${state.subView === 'fixture' ? 'bg-blue-950 text-white shadow-lg' : 'text-slate-400 hover:text-blue-950'}">Fixture</button>
                            </div>
                        </div>

                        ${state.subView === 'tabla' ? `
                            <div class="bg-white rounded-[4rem] shadow-2xl border border-slate-200/60 overflow-hidden">
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left min-w-[700px]">
                                        <thead class="bg-slate-50 border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">
                                            <tr>
                                                <th class="p-8 w-24 text-center">Pos</th>
                                                <th class="p-8">Club</th>
                                                <th class="p-8 text-center">PJ</th>
                                                <th class="p-8 text-center">PG</th>
                                                <th class="p-8 text-center">PE</th>
                                                <th class="p-8 text-center">PP</th>
                                                <th class="p-8 text-center">GF</th>
                                                <th class="p-8 text-center">GC</th>
                                                <th class="p-8 text-center">DG</th>
                                                <th class="p-8 text-center bg-yellow-500/10 text-yellow-600">PTS</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-100 text-sm">
                                            ${standings.map((club, i) => `
                                                <tr onclick="selectClubView('${club.name}')" class="cursor-pointer group hover:bg-slate-50 transition-colors">
                                                    <td class="p-8 text-center text-slate-300 font-black italic text-2xl group-hover:text-blue-950 transition-colors">${(i + 1).toString().padStart(2, '0')}</td>
                                                    <td class="p-8 flex items-center space-x-6">
                                                        <div class="w-14 h-14 bg-white rounded-2xl border border-slate-100 shadow-sm flex items-center justify-center p-2 shrink-0 group-hover:scale-110 transition-transform overflow-hidden">
                                                            <img src="${club.logo}" alt="${club.name}" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                                            <span class="text-blue-950 font-black italic text-lg uppercase hidden">${club.name.substring(0,3)}</span>
                                                        </div>
                                                        <div class="flex flex-col">
                                                            <span class="text-blue-950 font-black italic uppercase text-2xl tracking-tighter leading-none">${club.name}</span>
                                                            <span class="text-[9px] font-bold text-blue-500 uppercase mt-2 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all">Ver Plantilla Detallada →</span>
                                                        </div>
                                                    </td>
                                                    <td class="p-8 text-center font-bold text-slate-400 text-lg">${club.pj}</td>
                                                    <td class="p-8 text-center font-bold text-slate-500">${club.pg}</td>
                                                    <td class="p-8 text-center font-bold text-slate-500">${club.pe}</td>
                                                    <td class="p-8 text-center font-bold text-slate-500">${club.pp}</td>
                                                    <td class="p-8 text-center font-bold text-slate-500">${club.gf}</td>
                                                    <td class="p-8 text-center font-bold text-slate-500">${club.gc}</td>
                                                    <td class="p-8 text-center font-black ${club.dg >= 0 ? 'text-emerald-600' : 'text-rose-500'} text-lg">${club.dg > 0 ? '+' : ''}${club.dg}</td>
                                                    <td class="p-8 text-center bg-yellow-50/50 text-blue-950 font-black text-4xl italic">${club.pts}</td>
                                                </tr>
                                            `).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                ${activeFixture
                                    .sort((a, b) => {
                                        if (a.fechaNumero !== b.fechaNumero) {
                                            return a.fechaNumero - b.fechaNumero;
                                        }
                                        return 0;
                                    })
                                    .map((match, idx) => {
                                        const logoLocal = LIGA_CLUBS.find(c => c.name === match.local)?.logo || '';
                                        const logoVisita = LIGA_CLUBS.find(c => c.name === match.visita)?.logo || '';
                                        return `
                                        <div class="bg-white rounded-[3rem] p-8 shadow-xl border border-slate-100 relative overflow-hidden group hover:-translate-y-1 transition-transform">
                                            <div class="absolute top-0 right-0 p-6">
                                                <span class="bg-slate-100 text-slate-400 text-[8px] font-black uppercase px-3 py-1.5 rounded-full">${match.fecha}</span>
                                            </div>
                                            <div class="flex items-center justify-between mb-8 mt-4">
                                                <div class="text-center flex-1">
                                                    <div class="w-16 h-16 mx-auto mb-4 bg-slate-50 rounded-2xl p-3 flex items-center justify-center border overflow-hidden">
                                                        <img src="${logoLocal}" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                                        <span class="text-blue-950 font-black italic text-lg uppercase hidden">${match.local.substring(0,3)}</span>
                                                    </div>
                                                    <span class="text-blue-950 font-black uppercase italic text-sm block tracking-tighter leading-none">${match.local}</span>
                                                </div>
                                                <div class="px-4 text-center">
                                                    ${match.status === 'played' ? `
                                                        <div class="bg-blue-950 text-white font-black text-3xl italic px-5 py-2.5 rounded-2xl shadow-lg leading-none">
                                                            ${match.golesL} - ${match.golesV}
                                                        </div>
                                                    ` : `
                                                        <span class="text-slate-200 font-black text-2xl italic">VS</span>
                                                    `}
                                                </div>
                                                <div class="text-center flex-1">
                                                    <div class="w-16 h-16 mx-auto mb-4 bg-slate-50 rounded-2xl p-3 flex items-center justify-center border overflow-hidden">
                                                        <img src="${logoVisita}" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                                        <span class="text-blue-950 font-black italic text-lg uppercase hidden">${match.visita.substring(0,3)}</span>
                                                    </div>
                                                    <span class="text-blue-950 font-black uppercase italic text-sm block tracking-tighter leading-none">${match.visita}</span>
                                                </div>
                                            </div>
                                            <div class="pt-6 border-t border-slate-50 flex justify-between items-center text-slate-400 font-semibold">
                                                <div class="flex items-center gap-2">
                                                    <svg class="w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clipRule="evenodd"></path></svg>
                                                    <span class="text-[9px] font-black uppercase tracking-widest">${match.hora} HRS</span>
                                                </div>
                                                <div class="flex items-center gap-2">
                                                    <svg class="w-4 h-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd"></path></svg>
                                                    <span class="text-[9px] font-black uppercase tracking-widest">${match.cancha}</span>
                                                </div>
                                            </div>
                                        </div>
                                        `;
                                    }).join('')}
                                ${activeFixture.length === 0 ? `
                                    <div class="col-span-full py-20 bg-white rounded-[3rem] shadow-xl border border-slate-100 text-center">
                                        <p class="text-xl font-black italic text-slate-300 uppercase tracking-widest">No hay partidos programados para esta categoría</p>
                                    </div>
                                ` : ''}
                            </div>
                        `}
                    </div>
                </main>
                ${renderFooter()}
            </div>`;
        }

        function render() {
            const root = document.getElementById('app-root');
            if (state.view === 'lobby') {
                document.body.className = "bg-slate-950 font-sans text-slate-900 antialiased overflow-x-hidden";
                root.innerHTML = renderLobby();
            } else if (state.view === 'liga') {
                document.body.className = "bg-slate-50 font-sans text-slate-900 antialiased overflow-x-hidden";
                root.innerHTML = renderLiga();
            } else if (state.view === 'admin') {
                document.body.className = "bg-slate-900 font-sans text-slate-300 antialiased overflow-x-hidden";
                root.innerHTML = renderAdmin();
            }
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
